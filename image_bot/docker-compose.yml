services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    ports:
      - "3000:3000"
    environment:
      - ACCOUNT=your_qq_number
      - ACCOUNT_PASSWORD=your_qq_password
    restart: unless-stopped
    networks:
      - botnet

  bot-backend:
    build: .
    container_name: image_bot_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NAPCAT_API_URL=http://napcat:3000
    restart: unless-stopped
    networks:
      - botnet
    volumes:
      - ./cache:/workspace/cache

networks:
  botnet:
    driver: bridge
